name: Build and Deploy Cohort - GCP

on:
  push:
    branches:
      - demo
  workflow_dispatch:

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  build_and_deploy:
    runs-on: 'ubuntu-latest'
    env:
      # --- GCP CONFIGURATION ---
      GCP_REPO_NAME: cohort-repo
      GCP_SERVICE_NAME: cohort-demo-service
      GCP_IMAGE_NAME: cohort-app
      GCP_PROJECT_ID: cohort-lms
      GCP_REGION: asia-south1
      GCP_RUN_SERVICE_ACCOUNT: github-ci-cd-deployer@cohort-lms.iam.gserviceaccount.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          version: '>= 416.0.0'
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      # Note: Next.js needs many of these at build time if they are NEXT_PUBLIC vars
      - name: Create .env file for Docker Build
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "AUTH_URL=${{ secrets.AUTH_URL }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> .env
          echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> .env
          echo "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" >> .env
          echo "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" >> .env
          echo "NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID}}" >> .env
          echo "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}" >> .env
          echo "CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}" >> .env
          echo "APP_URL=${{ secrets.APP_URL }}" >> .env
          echo "GCS_PROJECT_ID=${{secrets.GCS_PROJECT_ID}}" >> .env
          echo "GCS_CLIENT_EMAIL=${{secrets.GCS_CLIENT_EMAIL}}" >> .env
          echo "GCS_PRIVATE_KEY=${{secrets.GCS_PRIVATE_KEY}}" >> .env
          echo "GCS_BUCKET_NAME=${{secrets.GCS_BUCKET_NAME}}" >> .env

      - name: Build and Push Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO_NAME }}/${{ env.GCP_IMAGE_NAME }}:demo
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO_NAME }}/${{ env.GCP_IMAGE_NAME }}:${{ github.sha }}
          file: ./Dockerfile
          build-args: |
            NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
            NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.GCP_SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO_NAME }}/${{ env.GCP_IMAGE_NAME }}:demo
          
          env_vars: |-
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_URL=${{ secrets.AUTH_URL }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID}}
            NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
            GCS_PROJECT_ID=${{secrets.GCS_PROJECT_ID}}
            GCS_CLIENT_EMAIL=${{secrets.GCS_CLIENT_EMAIL}}
            GCS_PRIVATE_KEY=${{secrets.GCS_PRIVATE_KEY}}
            GCS_BUCKET_NAME=${{secrets.GCS_BUCKET_NAME}}

          flags: |-
            --allow-unauthenticated
            --service-account=${{ env.GCP_RUN_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=cohort-lms:asia-south1:cohort